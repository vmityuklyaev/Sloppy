name: SloppyClient

options:
  bundleIdPrefix: team.sloppy
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.6"
    visionOS: "2.0"
  createIntermediateGroups: true

packages:
  SloppyClient:
    path: .
  AdaMCP:
    path: ../../Vendor/AdaMCP

targets:
  SloppyClient-macOS:
    type: application
    productName: SloppyClient
    platform: macOS
    deploymentTarget: "15.0"
    sources: Sources/SloppyClient
    dependencies:
      - package: AdaMCP
        product: AdaMCPPlugin
      - package: SloppyClient
        product: SloppyClientCore
      - package: SloppyClient
        product: SloppyClientUI
      - package: SloppyClient
        product: SloppyFeatureOverview
      - package: SloppyClient
        product: SloppyFeatureProjects
      - package: SloppyClient
        product: SloppyFeatureAgents
      - package: SloppyClient
        product: SloppyFeatureSettings
    info:
      path: SupportingFiles/macOS/Info.plist
      properties:
        CFBundleDisplayName: Sloppy
        CFBundleIdentifier: team.sloppy.client
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    entitlements:
      path: SupportingFiles/macOS/SloppyClient.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        aps-environment: development
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PROVISIONING_PROFILE_SPECIFIER: ""
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.client

  SloppyClient-iOS:
    type: application
    platform: iOS
    deploymentTarget: "18.6"
    sources: Sources/SloppyClient
    dependencies:
      - package: AdaMCP
        product: AdaMCPPlugin
      - package: SloppyClient
        product: SloppyClientCore
      - package: SloppyClient
        product: SloppyClientUI
      - package: SloppyClient
        product: SloppyFeatureOverview
      - package: SloppyClient
        product: SloppyFeatureProjects
      - package: SloppyClient
        product: SloppyFeatureAgents
      - package: SloppyClient
        product: SloppyFeatureSettings
    info:
      path: SupportingFiles/iOS/Info.plist
      properties:
        CFBundleDisplayName: Sloppy
        CFBundleIdentifier: team.sloppy.client
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: SupportingFiles/iOS/SloppyClient-iOS.entitlements
      properties:
        com.apple.security.app-sandbox: false
        aps-environment: development
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.client
        TARGETED_DEVICE_FAMILY: "1"

  SloppyClient-iPadOS:
    type: application
    platform: iOS
    deploymentTarget: "18.6"
    sources: Sources/SloppyClient
    dependencies:
      - package: AdaMCP
        product: AdaMCPPlugin
      - package: SloppyClient
        product: SloppyClientCore
      - package: SloppyClient
        product: SloppyClientUI
      - package: SloppyClient
        product: SloppyFeatureOverview
      - package: SloppyClient
        product: SloppyFeatureProjects
      - package: SloppyClient
        product: SloppyFeatureAgents
      - package: SloppyClient
        product: SloppyFeatureSettings
    info:
      path: SupportingFiles/iOS/Info.plist
      properties:
        CFBundleDisplayName: Sloppy
        CFBundleIdentifier: team.sloppy.client
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: SupportingFiles/iOS/SloppyClient-iPadOS.entitlements
      properties:
        com.apple.security.app-sandbox: false
        aps-environment: development
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.client
        TARGETED_DEVICE_FAMILY: "2"

  SloppyClient-visionOS:
    type: application
    platform: visionOS
    deploymentTarget: "2.0"
    sources: Sources/SloppyClient
    dependencies:
      - package: AdaMCP
        product: AdaMCPPlugin
      - package: SloppyClient
        product: SloppyClientCore
      - package: SloppyClient
        product: SloppyClientUI
      - package: SloppyClient
        product: SloppyFeatureOverview
      - package: SloppyClient
        product: SloppyFeatureProjects
      - package: SloppyClient
        product: SloppyFeatureAgents
      - package: SloppyClient
        product: SloppyFeatureSettings
    info:
      path: SupportingFiles/visionOS/Info.plist
      properties:
        CFBundleDisplayName: Sloppy
        CFBundleIdentifier: team.sloppy.client
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
    entitlements:
      path: SupportingFiles/visionOS/SloppyClient-visionOS.entitlements
      properties:
        com.apple.security.app-sandbox: false
        aps-environment: development
    settings:
      base:
        DEVELOPMENT_TEAM: 8PYCRS3EA3
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: team.sloppy.client
